  <script>
function validateForm()
{
var x=document.ug.un.value;
var y=document.ug.password.value;
if(x==null || x=="")
{
	alert("Please Enter The Username");
	document.ug.un.focus();
	return false;
}
if(y==""|| isNaN(y) || y.length>6 || y.length<6)
{
	alert("Please Enter the Password Properly")
	document.ug.password.focus();
	return false;
}
}
  </script>
